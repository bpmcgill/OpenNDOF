name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/OpenNDOF.App/OpenNDOF.App.csproj

      - name: Publish app (win-x64)
        run: dotnet publish src/OpenNDOF.App/OpenNDOF.App.csproj -c Release -r win-x64 --self-contained false -o artifacts/OpenNDOF-Bridge

      - name: Zip publish output
        shell: pwsh
        run: Compress-Archive -Path artifacts/OpenNDOF-Bridge/* -DestinationPath artifacts/OpenNDOF-Bridge-win-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenNDOF-Bridge-win-x64
          path: artifacts/OpenNDOF-Bridge-win-x64.zip

      - name: Create GitHub release and upload zip
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/OpenNDOF-Bridge-win-x64.zip
          generate_release_notes: true
